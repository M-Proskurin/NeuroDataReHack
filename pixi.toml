[workspace]
authors = ["Misha <m.proskurin@gmail.com>"]
channels = ["conda-forge"]
name = "NeuroDataReHack"
platforms = ["win-64"]
version = "0.1.0"

[tasks]
lab = "jupyter lab"

[dependencies]
# --- core scientific stack ---
python = "3.11.*"
numpy = "*"
scipy = "*"
pandas = "*"
matplotlib = "*"
seaborn = "*"
h5py = "*"
tqdm = "*"

# --- interactive / notebooks ---
jupyterlab = "*"
ipykernel = "*"
ipywidgets = "*"

# --- NWB / DANDI data access ---
pynwb = "*"
dandi = "*"
spikeinterface = "*"

# --- dimensionality reduction / manifolds ---
scikit-learn = ">=1.6,<1.8"
umap-learn = "*"
ripser = "*"          # persistent homology

# --- deep-learning backend for CEBRA (CPU build) ---
pytorch = "*"
numexpr = ">=2.14.1,<3"
plotly = ">=6.9.0,<7"

[pypi-dependencies]
cebra = "*"           # behavior-aligned nonlinear embedding (primary tool)
elephant = "*"        # GPFA + spike-train tools
remfile = ">=0.1.13, <0.2"
dpca = ">=1.0.5, <2"
track-linearization = ">=2.4.0, <3"
# giotto-tda omitted: no py3.11/win-64 wheel (needs CMake source build).
# Persistent homology is covered by `ripser` above.
